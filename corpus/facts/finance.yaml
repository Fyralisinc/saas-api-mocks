# ---- One-off opex --------------------------------------------------------
# Templated against office_life.yaml events and people facts.

one_off_rules:
  conference:
    # For each conference in EXTERNAL_EVENTS, charge per-attendee:
    cost_per_attendee_usd: 4500       # flights + hotel + fee + meals
    vendor: 'Various airlines + hotels'
    account: 'Travel & Conferences'
    memo_template: '{conference_label} — {attendee_count} attendees'

  team_offsite:
    # Twice a year (Jun + Dec, starting 2024)
    months: [6, 12]
    starting_from: '2024-06'
    cost_usd: 95000                   # venue + travel for ~25 people + food
    vendor: 'Various venues'
    account: 'Team Offsites'
    memo_template: 'Team offsite — {season} {year}'

  funding_legal_fee:
    # Triggered 1 month after each priced round closes.
    pct_of_round: 0.012               # ~1.2% of round size in legal fees
    cap_usd: 175000
    vendor: 'Wilson Sonsini'
    account: 'Legal & Accounting'
    memo_template: '{round_name} closing legal fees'

  recruiter_fee:
    # Triggered the month each non-cofounder employee starts.
    pct_of_first_year_salary: 0.18
    vendor: 'Various recruiters'
    account: 'Recruiting'
    memo_template: 'Recruiter fee — {full_name} ({role}, {team})'

  security_audit:
    # Two audits a year after testnet launch, $80k each.
    cost_usd: 80000
    months: [3, 9]
    starting_from: '2025-09'
    vendor: 'Trail of Bits'
    account: 'Security Audits'
    memo_template: '{quarter} security audit — Strata + Glock + bridge contracts'
