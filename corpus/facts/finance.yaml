# ---- Salary rules ---------------------------------------------------------
# Salary lookup: (location_bucket, role, level) → annual_usd. The compiler
# picks the most specific match (location+role+level), falling back to less
# specific. Cofounders always use the cofounder rate regardless of location.
#
# Locations are bucketed by the `location` string on each person:
#   nepal  — any location containing 'Nepal', 'Kathmandu', 'Lalitpur'
#   us     — 'Boston', 'NYC', 'New York', 'America'
#   eu     — 'İstanbul', 'Turkey', 'Estonia', 'Berlin', 'London'
#   other  — anything else, including blank (defaults to nepal — most of the team)
#
# Default tier for unset location is 'nepal' since the team is majority Nepal-based.

salary_rules:
  cofounder:
    any: 120000               # all 4 cofounders, regardless of location, $120k/yr

  by_location:
    nepal:
      engineer_senior: 90000
      engineer_ic:     75000
      research_ic:     80000
      research_senior: 90000
      infra_ic:        75000
      infra_senior:    85000
      ops_ic:          65000
      devrel_ic:       70000
      devrel_senior:   90000
      default:         70000
    us:
      engineer_senior: 240000
      engineer_ic:     210000
      research_ic:     220000
      research_senior: 240000
      infra_ic:        210000
      infra_senior:    230000
      ops_ic:          180000
      devrel_ic:       200000
      devrel_senior:   220000
      default:         200000
    eu:
      engineer_senior: 195000
      engineer_ic:     170000
      research_ic:     180000
      research_senior: 195000
      infra_ic:        170000
      infra_senior:    185000
      ops_ic:          140000
      devrel_ic:       160000
      devrel_senior:   180000
      default:         160000

