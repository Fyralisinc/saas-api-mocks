# Finance schedule for Gharelu-Alpen — feeds the QuickBooks mock provider.
#
# Hand-authored, deterministic source-of-truth:
#   funding_rounds      — every cash-in event (founders' capital, seed, strategic, grants)
#   salary_rules        — how monthly salary is derived from (role, level, location)
#   opex_recurring      — monthly recurring categories with stepped amounts over time
#   opex_one_off        — event-driven expenses (conference travel, offsites, audits,
#                         recruiter fees, post-round legal)
#   accounts            — chart of accounts QuickBooks will create
#   vendors             — payees for non-payroll spend
#
# Read by `corpus/scripts/10_compile_finance.py`, which expands the rules
# into per-month QuickBooks events for `05_render_events.py` to emit.

# ---- Chart of accounts -----------------------------------------------------
accounts:
- {name: 'Operating Bank',           number: '1000', type: bank,         subtype: checking,        description: 'Primary USD operating account (JPMorgan Chase, NYC)'}
- {name: 'Reserve Bank',             number: '1010', type: bank,         subtype: savings,         description: 'Treasury / runway buffer account'}
- {name: 'Accounts Receivable',      number: '1100', type: receivable,   subtype: ar,              description: 'Grants pending receipt'}
- {name: 'Accounts Payable',         number: '2000', type: payable,      subtype: ap,              description: 'Vendor invoices due'}
- {name: 'Paid-In Capital',          number: '3000', type: equity,       subtype: paid_in_capital, description: 'Cash from priced rounds + founder capital'}
- {name: 'Grant Income',             number: '4100', type: income,       subtype: grant_income,    description: 'Foundation / ecosystem grants'}
- {name: 'Payroll Expense',          number: '5000', type: expense,      subtype: payroll,         description: 'Monthly salaries — all employees'}
- {name: 'Compute & Cloud',          number: '5100', type: expense,      subtype: compute,         description: 'AWS, GCP, RPC node providers, GPUs for ZK proving'}
- {name: 'Legal & Accounting',       number: '5200', type: expense,      subtype: professional,    description: 'Counsel, fundraising legal, audit, bookkeeping'}
- {name: 'Office & Rent',            number: '5300', type: expense,      subtype: rent,            description: 'NYC office, utilities, Nepal coworking'}
- {name: 'Insurance',                number: '5310', type: expense,      subtype: insurance,       description: 'D&O, business, health (US employees)'}
- {name: 'Software & Subscriptions', number: '5400', type: expense,      subtype: software,        description: 'Slack, Notion, GitHub Enterprise, Linear, Figma, JetBrains, etc.'}
- {name: 'Travel & Conferences',     number: '5500', type: expense,      subtype: travel,          description: 'Flights, hotels, conference fees for BTC++ / Devcon / ZK Day / partner meetings'}
- {name: 'Team Offsites',            number: '5510', type: expense,      subtype: offsite,         description: 'Bi-annual all-team gatherings'}
- {name: 'Learning & Books',         number: '5600', type: expense,      subtype: learning,        description: 'Courses, books, conference recordings, cryptography reference material'}
- {name: 'Recruiting',               number: '5700', type: expense,      subtype: recruiting,      description: 'Recruiter fees, job-board postings, interview travel'}
- {name: 'Security Audits',          number: '5800', type: expense,      subtype: audit,           description: 'External audits of Strata / Glock / bridge contracts'}
- {name: 'Marketing & Events',       number: '5900', type: expense,      subtype: marketing,       description: 'Sponsorships, swag, blog promotion'}

