  - person:Rajil1213
  - person:ProofOfKeags
  - person:prajwolrg
  - person:pramodkandel
  tensions:
  - bridge answers depend on protocol finality wording
  - PRs queue behind release work
  - slide claims need source links
- id: B4
  start: 2025-02-17
  end: 2025-03-02
  kind: review
  summary: John consolidates the first diligence memo, but the team pulls back a planned "mainnet timeline" page after reviewers
    flag that external dates were firmer than engineering confidence.
  participants:
  - person:john-light
  - person:pramodkandel
  - person:prajwolrg
  - person:AaronFeickert
  - person:Rajil1213
  tensions:
  - commercial timeline pressure
  - reviewers asking for precise dates
  - protocol milestones still moving
- id: B5
  start: 2025-03-03
  end: 2025-03-16
  kind: audit
  summary: Krsna joins the diligence thread from infra and adds reproducible deployment notes, dashboard gaps, and a short
    incident-response appendix for investor security review.
  participants:
  - person:krsnapaudel
  - person:MdTeach
  - person:Rajil1213
  - person:pramodkandel
  tensions:
  - new infra owner ramping midstream
  - monitoring screenshots not yet investor-safe
  - incident process exists more in Slack than docs
- id: B6
  start: 2025-03-17
  end: 2025-03-26
  kind: design
  summary: The narrative shifts from a product roadmap deck to a protocol-readiness dossier, with Bitcoin Dollar framed as
    a downstream market unlocked by Strata rather than part of the near-term ship plan.
  participants:
  - person:pramodkandel
  - person:john-light
  - person:prajwolrg
  - person:AaronFeickert
  tensions:
  - positioning change requires deck rewrites
  - Bitcoin Dollar scope narrowed late
  - research caveats compete with fundraising clarity
- id: B7
  start: 2025-03-27
  end: 2025-04-02
  kind: ship
  summary: Delbonis and MdTeach close the last source-linked repo references while Pramod publishes the clean diligence room
    with a changelog and answer bank for partner calls.
  participants:
  - person:delbonis
  - person:MdTeach
  - person:pramodkandel
  - person:john-light
  - person:krsnapaudel
  tensions:
  - last-minute repo link cleanup
  - duplicated answers across memo and FAQ
  - final review lands after two investor calls
- id: B8
  start: 2025-04-03
  end: 2025-04-09
  kind: retro
  summary: After the strategic round announcement work wraps, the team records what slipped, which technical claims need owners,
    and which diligence artifacts should become maintained product docs.
  participants:
  - person:pramodkandel
  - person:john-light
  - person:prajwolrg
  - person:Rajil1213
  - person:krsnapaudel
  - person:AaronFeickert
  tensions:
  - fundraise artifacts drifting from canonical docs
  - ownership unclear after announcement
  - fatigue from parallel roadmap and diligence work
