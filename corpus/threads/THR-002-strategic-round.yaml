  - incomplete bridge threat model
  - whitepaper sections out of date
- id: B2
  start: 2025-01-20
  end: 2025-02-02
  kind: design
  summary: Prajwol and MdTeach draft the Strata execution and settlement brief while Aaron rewrites the ZK assumptions section
    to separate current implementation from target architecture.
  participants:
  - person:prajwolrg
  - person:MdTeach
  - person:AaronFeickert
  - person:john-light
  tensions:
  - settlement terminology still inconsistent
  - proof latency numbers missing
  - review bandwidth concentrated on two senior engineers
- id: B3
  start: 2025-02-03
  end: 2025-02-16
  kind: impl
  summary: Rajil turns bridge questions from early investor calls into a repo-backed risk register and starts landing small
